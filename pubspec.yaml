name: chopbetter
description: Affordable Nigerian food & healthy lifestyle recommendation app
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  provider: ^6.1.1

  # Local Database (lightweight, offline-first)
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # UI
  google_fonts: ^6.1.0
  flutter_svg: ^2.0.9
  percent_indicator: ^4.2.3
  smooth_page_indicator: ^1.1.0
  animate_do: ^3.3.4
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  lottie: ^3.0.0

  # Utilities
  shared_preferences: ^2.2.2
  intl: ^0.19.0
  uuid: ^4.3.3
  path_provider: ^2.1.2

  # Icons
  cupertino_icons: ^1.0.6
  flutter_icons: ^1.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  hive_generator: ^2.0.1
  build_runner: ^2.4.8
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/lottie/
